{% set name = "xcube-multistore" %}
{% set version = "0.3.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/xcube-dev/xcube-multistore/archive/v{{ version }}.tar.gz
  sha256: 9716b6e0e19bf307ff44fe6105c229cd179e3bcb93811676c4f05b927bde8196

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - dask
    - fsspec
    - numpy
    - panel
    - pyproj
    - tabulate
    - xarray
    - xcube >=1.9.0
    - xcube-resampling >=0.2.3
    - xcube-cci >=0.11.2,<=0.11.10
    - xcube-cds >=1.0.0
    - xcube-clms >=0.2.2
    - xcube-stac >=1.1.2
    - xcube-zenodo >=1.0.0
    - yaml

test:
  imports:
    - xcube_multistore
  requires:
    - python {{ python_min }}

about:
  summary: xcube Multi-Source Data Store; Seamlessly Integrating and Harmonizing Data from Multiple Sources
  home: https://github.com/xcube-dev/xcube-multistore
  license: MIT
  license_family: MIT
  license_file: LICENSE
  description: xcube-multistore is a Python package
  dev_url: https://github.com/xcube-dev/xcube-multistore

extra:
  recipe-maintainers:
    - clarasb
    - b-yogesh
    - konstntokas
    - forman
    - pont-us
    - thomasstorm
    - TejasMorbagal
